<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷宫探险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            padding: 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        
        .game-info span {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        
        #maze-container {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        
        #maze {
            display: grid;
            gap: 2px;
            background: #000;
            padding: 2px;
            border-radius: 8px;
        }
        
        .cell {
            width: 25px;
            height: 25px;
            transition: all 0.1s ease;
        }
        
        .wall {
            background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        }
        
        .path {
            background: linear-gradient(135deg, #dfe6e9 0%, #b2bec3 100%);
        }
        
        .player {
            background: linear-gradient(135deg, #00d4ff 0%, #0984e3 100%);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
            animation: pulse 1s infinite;
        }
        
        .exit {
            background: linear-gradient(135deg, #00b894 0%, #55efc4 100%);
            border-radius: 5px;
            animation: glow 1.5s infinite;
        }
        
        .visited {
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            opacity: 0.5;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.9); }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 10px rgba(85, 239, 196, 0.5); }
            50% { box-shadow: 0 0 25px rgba(85, 239, 196, 1); }
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        
        button {
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.6);
        }
        
        .instructions {
            margin-top: 20px;
            text-align: center;
            opacity: 0.8;
            font-size: 0.9rem;
        }
        
        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0, 184, 148, 0.95), rgba(85, 239, 196, 0.95));
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            animation: bounceIn 0.5s ease;
        }
        
        @keyframes bounceIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }
        
        .win-message h2 {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        
        .win-message p {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        /* Mobile controls */
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
        }
        
        .mobile-btn {
            width: 60px;
            height: 60px;
            font-size: 1.5rem;
            padding: 0;
        }
        
        @media (max-width: 600px) {
            .cell {
                width: 20px;
                height: 20px;
            }
            
            .mobile-controls {
                display: grid;
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(3, 60px);
                justify-content: center;
            }
            
            .mobile-btn:nth-child(1) { grid-area: 1 / 2; }
            .mobile-btn:nth-child(2) { grid-area: 2 / 1; }
            .mobile-btn:nth-child(3) { grid-area: 2 / 3; }
            .mobile-btn:nth-child(4) { grid-area: 3 / 2; }
        }
    </style>
</head>
<body>
    <h1>🏰 迷宫探险</h1>
    
    <div class="game-info">
        <span>步数: <strong id="steps">0</strong></span>
        <span>时间: <strong id="time">00:00</strong></span>
        <span>关卡: <strong id="level">1</strong></span>
    </div>
    
    <div id="maze-container">
        <div id="maze"></div>
    </div>
    
    <div class="controls">
        <button onclick="newMaze()">🎲 新迷宫</button>
        <button onclick="resetGame()">🔄 重置</button>
    </div>
    
    <div class="mobile-controls">
        <button class="mobile-btn" onclick="move(0, -1)">⬆️</button>
        <button class="mobile-btn" onclick="move(-1, 0)">⬅️</button>
        <button class="mobile-btn" onclick="move(1, 0)">➡️</button>
        <button class="mobile-btn" onclick="move(0, 1)">⬇️</button>
    </div>
    
    <div class="instructions">
        <p>使用 <strong>方向键</strong> 或 <strong>WASD</strong> 移动</p>
        <p>找到 <span style="color: #55efc4;">绿色出口</span> 即可过关！</p>
    </div>
    
    <script>
        let maze = [];
        let playerPos = { x: 1, y: 1 };
        let exitPos = { x: 0, y: 0 };
        let steps = 0;
        let level = 1;
        let startTime;
        let timerInterval;
        const baseSize = 15;
        
        function init() {
            newMaze();
            document.addEventListener('keydown', handleKeydown);
        }
        
        function handleKeydown(e) {
            const key = e.key.toLowerCase();
            if (key === 'arrowup' || key === 'w') move(0, -1);
            else if (key === 'arrowdown' || key === 's') move(0, 1);
            else if (key === 'arrowleft' || key === 'a') move(-1, 0);
            else if (key === 'arrowright' || key === 'd') move(1, 0);
        }
        
        function newMaze() {
            const size = baseSize + (level - 1) * 2;
            generateMaze(size, size);
            playerPos = { x: 1, y: 1 };
            steps = 0;
            updateSteps();
            renderMaze();
            startTimer();
        }
        
        function resetGame() {
            playerPos = { x: 1, y: 1 };
            steps = 0;
            updateSteps();
            renderMaze();
            startTimer();
        }
        
        function generateMaze(width, height) {
            // Initialize maze with walls
            maze = [];
            for (let y = 0; y < height; y++) {
                maze[y] = [];
                for (let x = 0; x < width; x++) {
                    maze[y][x] = 1; // 1 = wall
                }
            }
            
            // Recursive backtracking algorithm
            function carve(x, y) {
                maze[y][x] = 0; // 0 = path
                
                const directions = [
                    [0, -2], [0, 2], [-2, 0], [2, 0]
                ].sort(() => Math.random() - 0.5);
                
                for (const [dx, dy] of directions) {
                    const nx = x + dx;
                    const ny = y + dy;
                    
                    if (nx > 0 && nx < width - 1 && ny > 0 && ny < height - 1 && maze[ny][nx] === 1) {
                        maze[y + dy/2][x + dx/2] = 0;
                        carve(nx, ny);
                    }
                }
            }
            
            carve(1, 1);
            
            // Set exit position
            exitPos = { x: width - 2, y: height - 2 };
            maze[exitPos.y][exitPos.x] = 0;
        }
        
        function renderMaze() {
            const mazeEl = document.getElementById('maze');
            mazeEl.style.gridTemplateColumns = `repeat(${maze[0].length}, 25px)`;
            mazeEl.innerHTML = '';
            
            for (let y = 0; y < maze.length; y++) {
                for (let x = 0; x < maze[y].length; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (x === playerPos.x && y === playerPos.y) {
                        cell.classList.add('player');
                    } else if (x === exitPos.x && y === exitPos.y) {
                        cell.classList.add('exit');
                    } else if (maze[y][x] === 1) {
                        cell.classList.add('wall');
                    } else {
                        cell.classList.add('path');
                    }
                    
                    mazeEl.appendChild(cell);
                }
            }
        }
        
        function move(dx, dy) {
            const newX = playerPos.x + dx;
            const newY = playerPos.y + dy;
            
            if (newX >= 0 && newX < maze[0].length && 
                newY >= 0 && newY < maze.length && 
                maze[newY][newX] === 0) {
                
                playerPos.x = newX;
                playerPos.y = newY;
                steps++;
                updateSteps();
                renderMaze();
                
                // Check win
                if (playerPos.x === exitPos.x && playerPos.y === exitPos.y) {
                    win();
                }
            }
        }
        
        function updateSteps() {
            document.getElementById('steps').textContent = steps;
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
        }
        
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const secs = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('time').textContent = `${mins}:${secs}`;
        }
        
        function win() {
            clearInterval(timerInterval);
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            
            const winMsg = document.createElement('div');
            winMsg.className = 'win-message';
            winMsg.innerHTML = `
                <h2>🎉 恭喜过关！</h2>
                <p>步数: ${steps} | 时间: ${document.getElementById('time').textContent}</p>
                <button onclick="nextLevel(this)">下一关 ➡️</button>
            `;
            document.body.appendChild(winMsg);
        }
        
        function nextLevel(btn) {
            const winMsg = btn.parentElement;
            winMsg.remove();
            level++;
            document.getElementById('level').textContent = level;
            newMaze();
        }
        
        init();
    </script>
</body>
</html>
