<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            padding: 20px;
            overflow: hidden;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }
        
        .game-info span {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 25px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .game-info strong {
            color: #00ff88;
        }
        
        #game-container {
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 
                        0 0 60px rgba(0, 255, 136, 0.1);
            backdrop-filter: blur(10px);
        }
        
        #game {
            border-radius: 10px;
            background: #0a0a0a;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        
        button {
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            color: #000;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.3);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 255, 136, 0.5);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .instructions {
            margin-top: 20px;
            text-align: center;
            opacity: 0.7;
            font-size: 0.9rem;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            z-index: 10;
        }
        
        .overlay h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #00ff88;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
        }
        
        .overlay p {
            font-size: 1.3rem;
            margin-bottom: 25px;
        }
        
        .overlay.hidden {
            display: none;
        }
        
        /* Mobile controls */
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 5px;
        }
        
        .mobile-btn {
            width: 70px;
            height: 70px;
            font-size: 2rem;
            padding: 0;
            background: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
            border-radius: 15px;
        }
        
        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
                grid-template-columns: repeat(3, 70px);
                grid-template-rows: repeat(3, 70px);
                justify-content: center;
            }
            
            .mobile-btn:nth-child(1) { grid-area: 1 / 2; }
            .mobile-btn:nth-child(2) { grid-area: 2 / 1; }
            .mobile-btn:nth-child(3) { grid-area: 2 / 3; }
            .mobile-btn:nth-child(4) { grid-area: 3 / 2; }
        }
        
        .high-score {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 215, 0, 0.2);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        .high-score strong {
            color: #ffd700;
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    
    <div class="game-info">
        <span>分数: <strong id="score">0</strong></span>
        <span>长度: <strong id="length">3</strong></span>
        <span>速度: <strong id="speed">1</strong></span>
    </div>
    
    <div id="game-container">
        <div class="high-score">最高分: <strong id="highScore">0</strong></div>
        <canvas id="game" width="400" height="400"></canvas>
        <div id="start-overlay" class="overlay">
            <h2>🐍 贪吃蛇</h2>
            <p>按任意方向键开始</p>
        </div>
        <div id="gameover-overlay" class="overlay hidden">
            <h2>💀 游戏结束</h2>
            <p>得分: <strong id="final-score">0</strong></p>
            <button onclick="restartGame()">再来一局</button>
        </div>
    </div>
    
    <div class="controls">
        <button onclick="restartGame()">🔄 重新开始</button>
        <button onclick="togglePause()">⏸️ 暂停</button>
    </div>
    
    <div class="mobile-controls">
        <button class="mobile-btn" onclick="changeDirection('up')">⬆️</button>
        <button class="mobile-btn" onclick="changeDirection('left')">⬅️</button>
        <button class="mobile-btn" onclick="changeDirection('right')">➡️</button>
        <button class="mobile-btn" onclick="changeDirection('down')">⬇️</button>
    </div>
    
    <div class="instructions">
        <p>使用 <strong>方向键</strong> 或 <strong>WASD</strong> 控制方向</p>
        <p>吃掉食物增加长度，不要撞墙或咬到自己！</p>
    </div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const gridCount = canvas.width / gridSize;
        
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let gameLoop;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameSpeed = 150;
        let speedLevel = 1;
        let isPaused = false;
        let isGameOver = false;
        let isStarted = false;
        
        document.getElementById('highScore').textContent = highScore;
        
        function init() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameSpeed = 150;
            speedLevel = 1;
            isPaused = false;
            isGameOver = false;
            isStarted = false;
            
            updateScore();
            spawnFood();
            draw();
            
            document.getElementById('start-overlay').classList.remove('hidden');
            document.getElementById('gameover-overlay').classList.add('hidden');
        }
        
        function startGame() {
            if (gameLoop) clearInterval(gameLoop);
            isStarted = true;
            document.getElementById('start-overlay').classList.add('hidden');
            gameLoop = setInterval(update, gameSpeed);
        }
        
        function restartGame() {
            if (gameLoop) clearInterval(gameLoop);
            init();
            startGame();
        }
        
        function togglePause() {
            if (isGameOver || !isStarted) return;
            
            isPaused = !isPaused;
            if (isPaused) {
                clearInterval(gameLoop);
            } else {
                gameLoop = setInterval(update, gameSpeed);
            }
        }
        
        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * gridCount),
                    y: Math.floor(Math.random() * gridCount)
                };
            } while (snake.some(seg => seg.x === food.x && seg.y === food.y));
        }
        
        function update() {
            if (isPaused || isGameOver) return;
            
            direction = nextDirection;
            
            const head = { ...snake[0] };
            
            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }
            
            // Check collision with walls
            if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
                gameOver();
                return;
            }
            
            // Check collision with self
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // Check if food eaten
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                spawnFood();
                
                // Increase speed every 50 points
                if (score % 50 === 0 && gameSpeed > 50) {
                    gameSpeed -= 10;
                    speedLevel++;
                    document.getElementById('speed').textContent = speedLevel;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, gameSpeed);
                }
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid (subtle)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            // Draw snake
            snake.forEach((seg, index) => {
                const gradient = ctx.createRadialGradient(
                    seg.x * gridSize + gridSize/2,
                    seg.y * gridSize + gridSize/2,
                    0,
                    seg.x * gridSize + gridSize/2,
                    seg.y * gridSize + gridSize/2,
                    gridSize/2
                );
                
                if (index === 0) {
                    // Head
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    // Body
                    const alpha = 1 - (index / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(0, 212, 255, ${alpha})`);
                    gradient.addColorStop(1, `rgba(0, 150, 200, ${alpha})`);
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    seg.x * gridSize + 1,
                    seg.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();
                
                // Eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#000';
                    const eyeSize = 3;
                    let eyeX1, eyeY1, eyeX2, eyeY2;
                    
                    switch (direction) {
                        case 'right':
                            eyeX1 = seg.x * gridSize + 14;
                            eyeY1 = seg.y * gridSize + 5;
                            eyeX2 = seg.x * gridSize + 14;
                            eyeY2 = seg.y * gridSize + 12;
                            break;
                        case 'left':
                            eyeX1 = seg.x * gridSize + 6;
                            eyeY1 = seg.y * gridSize + 5;
                            eyeX2 = seg.x * gridSize + 6;
                            eyeY2 = seg.y * gridSize + 12;
                            break;
                        case 'up':
                            eyeX1 = seg.x * gridSize + 5;
                            eyeY1 = seg.y * gridSize + 6;
                            eyeX2 = seg.x * gridSize + 12;
                            eyeY2 = seg.y * gridSize + 6;
                            break;
                        case 'down':
                            eyeX1 = seg.x * gridSize + 5;
                            eyeY1 = seg.y * gridSize + 14;
                            eyeX2 = seg.x * gridSize + 12;
                            eyeY2 = seg.y * gridSize + 14;
                            break;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eyeX1, eyeY1, eyeSize, 0, Math.PI * 2);
                    ctx.arc(eyeX2, eyeY2, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            // Draw food
            const foodGradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                0,
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2
            );
            foodGradient.addColorStop(0, '#ff6b6b');
            foodGradient.addColorStop(1, '#ee5a5a');
            
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            
            // Food glow
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('gameover-overlay').classList.remove('hidden');
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
        }
        
        function changeDirection(newDir) {
            const opposites = {
                'up': 'down',
                'down': 'up',
                'left': 'right',
                'right': 'left'
            };
            
            if (newDir !== opposites[direction]) {
                nextDirection = newDir;
                if (!isStarted) startGame();
            }
        }
        
        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (['arrowup', 'w'].includes(key)) {
                changeDirection('up');
                e.preventDefault();
            } else if (['arrowdown', 's'].includes(key)) {
                changeDirection('down');
                e.preventDefault();
            } else if (['arrowleft', 'a'].includes(key)) {
                changeDirection('left');
                e.preventDefault();
            } else if (['arrowright', 'd'].includes(key)) {
                changeDirection('right');
                e.preventDefault();
            } else if (key === ' ') {
                togglePause();
                e.preventDefault();
            }
        });
        
        // Touch controls for swipe
        let touchStartX = 0;
        let touchStartY = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        
        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 30) changeDirection('right');
                else if (dx < -30) changeDirection('left');
            } else {
                if (dy > 30) changeDirection('down');
                else if (dy < -30) changeDirection('up');
            }
        });
        
        init();
    </script>
</body>
</html>
